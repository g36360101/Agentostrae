    <style id="theme-vars">
/* AgentOS Brand Design System */
/* Tone: Professional, focused creation tool — dark theme with warm neutral accents */

:root {
  /* === Color System === */
  /* Background layers */
  --color-bg-base: #0f0f12;
  --color-bg-elevated: #18181d;
  --color-bg-surface: #1e1e24;
  --color-bg-overlay: #26262e;
  --color-bg-hover: #2a2a34;
  --color-bg-active: #31313c;

  /* Brand primary — warm amber for creative energy */
  --color-primary: #d4a853;
  --color-primary-hover: #dfb962;
  --color-primary-active: #c49a44;
  --color-primary-muted: rgba(212, 168, 83, 0.12);
  --color-primary-subtle: rgba(212, 168, 83, 0.06);

  /* Text hierarchy */
  --color-text-primary: #eae8e4;
  --color-text-secondary: #a09e99;
  --color-text-tertiary: #6d6b67;
  --color-text-inverse: #0f0f12;
  --color-text-accent: #d4a853;

  /* Borders */
  --color-border: rgba(255, 255, 255, 0.08);
  --color-border-hover: rgba(255, 255, 255, 0.14);
  --color-border-active: rgba(212, 168, 83, 0.4);
  --color-border-subtle: rgba(255, 255, 255, 0.04);

  /* State colors — semantic only */
  --state-success: #4ade80;
  --state-success-muted: rgba(74, 222, 128, 0.12);
  --state-warning: #fbbf24;
  --state-warning-muted: rgba(251, 191, 36, 0.12);
  --state-error: #f87171;
  --state-error-muted: rgba(248, 113, 113, 0.12);
  --state-info: #60a5fa;
  --state-info-muted: rgba(96, 165, 250, 0.12);

  /* Asset status colors */
  --status-suggested: #818cf8;
  --status-confirmed: #4ade80;
  --status-rejected: #f87171;
  --status-reviewing: #fbbf24;
  --status-archived: #6d6b67;

  /* Spoiler levels */
  --spoiler-none: #4ade80;
  --spoiler-low: #60a5fa;
  --spoiler-medium: #fbbf24;
  --spoiler-high: #f97316;
  --spoiler-ending: #f87171;

  /* === Typography === */
  --font-display: 'DM Serif Display', Georgia, 'Noto Serif SC', serif;
  --font-body: 'Inter', -apple-system, 'Noto Sans SC', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  /* Type scale */
  --text-xs: 0.75rem;
  --text-xs-leading: 1rem;
  --text-sm: 0.8125rem;
  --text-sm-leading: 1.25rem;
  --text-base: 0.875rem;
  --text-base-leading: 1.5rem;
  --text-lg: 1rem;
  --text-lg-leading: 1.625rem;
  --text-xl: 1.125rem;
  --text-xl-leading: 1.75rem;
  --text-2xl: 1.375rem;
  --text-2xl-leading: 1.875rem;
  --text-3xl: 1.75rem;
  --text-3xl-leading: 2.25rem;
  --text-4xl: 2.25rem;
  --text-4xl-leading: 2.75rem;

  /* === Spacing === */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;

  /* === Shape === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* === Shadows — surface-led, minimal shadow alpha === */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 20px rgba(212, 168, 83, 0.15);

  /* === Transitions === */
  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;
  --transition-slow: 300ms ease;
}

/* === Component Patterns === */
.card {
  background: var(--color-bg-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-6);
}

.card:hover {
  border-color: var(--color-border-hover);
}

.card-interactive:hover {
  border-color: var(--color-border-active);
  box-shadow: var(--shadow-glow);
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  font-size: var(--text-xs);
  font-weight: 500;
  border-radius: var(--radius-full);
  line-height: var(--text-xs-leading);
}

.badge-suggested {
  background: rgba(129, 140, 248, 0.15);
  color: #818cf8;
}

.badge-confirmed {
  background: rgba(74, 222, 128, 0.15);
  color: #4ade80;
}

.badge-rejected {
  background: rgba(248, 113, 113, 0.15);
  color: #f87171;
}

.badge-reviewing {
  background: rgba(251, 191, 36, 0.15);
  color: #fbbf24;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-5);
  background: var(--color-primary);
  color: var(--color-text-inverse);
  font-size: var(--text-sm);
  font-weight: 500;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-primary:hover {
  background: var(--color-primary-hover);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-5);
  background: transparent;
  color: var(--color-text-primary);
  font-size: var(--text-sm);
  font-weight: 500;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-secondary:hover {
  background: var(--color-bg-hover);
  border-color: var(--color-border-hover);
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: transparent;
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
  font-weight: 500;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-ghost:hover {
  background: var(--color-bg-hover);
  color: var(--color-text-primary);
}

/* Progress bar */
.progress-track {
  width: 100%;
  height: 3px;
  background: var(--color-bg-overlay);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: var(--radius-full);
  transition: width var(--transition-slow);
}

/* Step indicator */
.step-indicator {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--color-text-tertiary);
}

.step-indicator.active {
  color: var(--color-primary);
}

.step-indicator.completed {
  color: var(--state-success);
}

/* Tooltip */
.tooltip {
  background: var(--color-bg-overlay);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
}

    </style>

        background-color: currentColor;

  <script>
    // Character count for textarea
    function updateCharCount() {
      const textarea = document.getElementById('idea-textarea');
      const count = document.getElementById('char-count');
      count.textContent = textarea.value.length;
    }

    // Toggle preferences panel
    function togglePreferences() {
      const btn = document.getElementById('pref-toggle');
      const panel = document.getElementById('pref-panel');
      const isOpen = panel.classList.contains('expanded');

      if (isOpen) {
        panel.classList.remove('expanded');
        btn.classList.remove('open');
        btn.querySelector('span:last-child').textContent = '展开创作偏好';
      } else {
        panel.classList.add('expanded');
        btn.classList.add('open');
        btn.querySelector('span:last-child').textContent = '收起创作偏好';
      }
    }

    // Creativity slider label
    function updateCreativityLabel() {
      const slider = document.getElementById('creativity-slider');
      const label = document.getElementById('creativity-label');
      const val = parseInt(slider.value);
      if (val <= 33) {
        label.textContent = '保守';
      } else if (val <= 66) {
        label.textContent = '平衡';
      } else {
        label.textContent = '大胆';
      }
    }

    // Clear form
    function clearForm() {
      document.getElementById('idea-textarea').value = '';
      document.getElementById('char-count').textContent = '0';
      document.querySelectorAll('.form-input').forEach(el => {
        if (el.tagName === 'SELECT') {
          el.selectedIndex = 0;
        } else {
          el.value = '';
        }
      });
      document.getElementById('creativity-slider').value = 50;
      document.getElementById('creativity-label').textContent = '平衡';
    }
  </script>
