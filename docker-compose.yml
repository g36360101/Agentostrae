services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos
      POSTGRES_DB: agentos
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - agentos_postgres_data:/var/lib/postgresql/data

volumes:
  agentos_postgres_data:
